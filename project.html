<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project</title>
  <link rel="icon" href="favicon.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --gray: #888; --light-gray: #ebebeb; --white: #fff;
      --font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-serif: "Georgia", "Times New Roman", serif;
    }
    html { font-size: 16px; }
    body { background: var(--white); color: var(--black); font-family: var(--font-sans); font-weight: 400; line-height: 1.7; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    /* ── Nav ── */
    nav { position: sticky; top: 0; background: rgba(255,255,255,0.82); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 100; }
    .nav-inner { max-width: 720px; margin: 0 auto; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-size: 0.9375rem; font-weight: 600; letter-spacing: -0.01em; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { font-size: 0.8125rem; color: var(--gray); transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--black); }

    /* ── Page header ── */
    .page-header {
      max-width: 720px; margin: 0 auto; padding: 64px 24px 0;
    }
    .page-title {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 700; letter-spacing: -0.01em; line-height: 1.05;
    }
    .page-count { font-size: 0.8125rem; color: var(--gray); margin-top: 8px; }

    /* ── Grid ── */
    .proj-grid {
      max-width: 720px; margin: 0 auto;
      padding: 48px 24px 96px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
    }

    /* ── Card ── */
    .card { display: block; cursor: pointer; }
    .card:hover { text-decoration: none; }

    .img-frame {
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.07);
      overflow: hidden;
      margin-bottom: 18px;
    }
    .img-ph {
      width: 100%; aspect-ratio: 7/5;
      background: #f2f2f2;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .card:hover .img-ph { transform: scale(1.03); }
    .img-ph span { font-size: 0.6875rem; letter-spacing: 0.08em; text-transform: uppercase; color: #c0c0c0; user-select: none; }
    .img-frame img { width: 100%; aspect-ratio: 7/5; object-fit: cover; display: block; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .card:hover .img-frame img { transform: scale(1.03); }

    .card-title {
      font-size: 1rem; font-weight: 500; letter-spacing: -0.01em;
      margin-bottom: 4px;
      transition: opacity 0.15s;
    }
    .card:hover .card-title { opacity: 0.6; }

    .card-meta { font-size: 0.8125rem; color: var(--gray); }

    /* ── Footer ── */
    footer { padding: 0 0 24px; }
    .footer-outer { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; border-top: 1px solid var(--light-gray); padding-top: 16px; }
    .footer-copy { font-size: 0.8125rem; color: var(--gray); }
    .footer-links { display: flex; gap: 20px; list-style: none; }
    .footer-links a { font-size: 0.8125rem; color: var(--gray); }
    .footer-links a:hover { color: var(--black); }

    @media (max-width: 640px) {
      .proj-grid { grid-template-columns: 1fr; gap: 40px; padding: 40px 24px 72px; }
      .page-header { padding: 48px 24px 36px; }
      .nav-inner { padding: 0 24px; }
      .nav-links { gap: 18px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Jaein Works.</a>
      <ul class="nav-links">
        <li><a href="index.html">Index</a></li>
        <li><a href="project.html" class="active">Project</a></li>
        <li><a href="mailto:j.g.min830@gmail.com">Email</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1 class="page-title">Project</h1>
      <p class="page-count">4 projects</p>
    </div>

    <div class="proj-grid" id="proj-grid"></div>
  </main>

  <footer>
    <div class="footer-outer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; 2026 Jaein Min.</span>
      <ul class="footer-links">
        <li><a href="https://www.instagram.com/janem1n/" target="_blank" rel="noopener">Instagram</a></li>
        <li><a href="https://linkedin.com/" target="_blank" rel="noopener">LinkedIn</a></li>
        <li><a href="https://drive.google.com/file/d/1FS4FL3Ozoogj-3Ti-RuVPRnmwaTuRskZ/view?usp=drive_link" target="_blank" rel="noopener">Resume</a></li>
      </ul>
    </div>
    </div>
  </footer>

  <script src="data/projects.js"></script>
  <script src="js/thumb-loader.js"></script>
  <script>
    (function () {
      document.querySelector('.page-count').textContent = PROJECTS.length + ' projects';
      var grid = document.getElementById('proj-grid');
      PROJECTS.forEach(function (p) {
        var a = document.createElement('a');
        a.href = p.url;
        a.className = 'card';
        var thumbInner = '<div class="img-ph"><span>' + p.thumbLabel + '</span></div>';
        a.innerHTML =
          '<div class="img-frame">' + thumbInner + '</div>' +
          '<h2 class="card-title">' + p.title + '</h2>' +
          '<p class="card-meta">' + p.field + ' · ' + p.period + '</p>';
        grid.appendChild(a);
      });
    })();
  </script>
</body>
</html>
